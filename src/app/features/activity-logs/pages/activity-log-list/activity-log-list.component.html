<div class="page-header">
  <div>
    <h2>Activity Logs</h2>
    <p>Track user actions and system operations.</p>
  </div>
</div>

<div class="card-box">
  <input
    class="input-field"
    type="text"
    placeholder="Search by user, action, module, status..."
    [(ngModel)]="searchText"
  />
</div>

<div class="card-box table-wrapper">
  <table class="custom-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>User</th>
        <th>Action</th>
        <th>Module</th>
        <th>Date & Time</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of filteredLogs">
        <td>{{ item.id }}</td>
        <td>{{ item.user }}</td>
        <td>{{ item.action }}</td>
        <td>{{ item.module }}</td>
        <td>{{ item.dateTime }}</td>
        <td>
          <span
            class="status-badge"
            [ngClass]="{
              'status-active': item.status === 'Success',
              'status-pending': item.status === 'Pending',
              'status-inactive': item.status === 'Failed'
            }"
          >
            {{ item.status }}
          </span>
        </td>
      </tr>

      <tr *ngIf="filteredLogs.length === 0">
        <td colspan="6" class="no-data">No activity log found.</td>
      </tr>
    </tbody>
  </table>
</div>

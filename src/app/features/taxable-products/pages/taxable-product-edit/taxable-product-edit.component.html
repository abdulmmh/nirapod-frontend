<!-- src/app/features/taxable-product/edit/product-edit.component.html -->

<div class="page-wrapper">
  <div class="form-card">

    <div class="card-header">
      <h2 class="card-title">Edit Taxable Product</h2>
    </div>

    <div class="card-body">

      <div *ngIf="initialising" class="loading-state">Loading product data…</div>

      <ng-container *ngIf="!initialising">

        <div *ngIf="errorMessage" class="alert-error">{{ errorMessage }}</div>

        <form (ngSubmit)="onSubmit()" #productForm="ngForm">

          <div class="form-row">

            <div class="form-group">
              <label for="productName" class="form-label">Product Name <span class="required">*</span></label>
              <input
                id="productName"
                type="text"
                class="form-control"
                name="productName"
                [(ngModel)]="request.productName"
                required>
            </div>

            <div class="form-group">
              <label for="hsCode" class="form-label">HS Code <span class="required">*</span></label>
              <input
                id="hsCode"
                type="text"
                class="form-control"
                name="hsCode"
                [(ngModel)]="request.hsCode"
                required>
            </div>

          </div>

          <div class="form-row">

            <!-- Category — dynamic -->
            <div class="form-group">
              <label for="category" class="form-label">Category <span class="required">*</span></label>
              <select
                id="category"
                class="form-control"
                name="category"
                [(ngModel)]="request.category"
                required>
                <option value="" disabled>Select category</option>
                <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
              </select>
            </div>

            <!-- Unit — dynamic -->
            <div class="form-group">
              <label for="unit" class="form-label">Unit <span class="required">*</span></label>
              <select
                id="unit"
                class="form-control"
                name="unit"
                [(ngModel)]="request.unit"
                required>
                <option value="" disabled>Select unit</option>
                <option *ngFor="let u of units" [value]="u">{{ u }}</option>
              </select>
            </div>

          </div>

          <div class="form-row">

            <!-- Tax Structure — dynamic -->
            <div class="form-group">
              <label for="taxStructureId" class="form-label">Tax Structure <span class="required">*</span></label>
              <select
                id="taxStructureId"
                class="form-control"
                name="taxStructureId"
                [(ngModel)]="request.taxStructureId"
                (change)="onTaxStructureChange($any($event.target).value)"
                required>
                <option [ngValue]="null" disabled>Select tax structure</option>
                <option *ngFor="let ts of taxStructures" [value]="ts.id">
                  {{ ts.taxName }} ({{ ts.taxCode }})
                </option>
              </select>
            </div>

            <!-- Tax Rate Preview — read-only -->
            <div class="form-group">
              <label class="form-label">Tax Rate (Preview)</label>
              <input
                type="text"
                class="form-control form-control-readonly"
                [value]="taxRatePreview !== null ? (taxRatePreview + '% — ' + taxTypePreview) : 'Select a tax structure'"
                 readonly>
              <small class="field-hint">Automatically determined by the selected tax structure.</small>
            </div>

          </div>

          <div class="form-group form-group-full">
            <label for="description" class="form-label">Description</label>
            <textarea
              id="description"
              class="form-control"
              name="description"
              [(ngModel)]="request.description"
              rows="3"></textarea>
          </div>

          <div class="form-group">
            <label for="status" class="form-label">Status <span class="required">*</span></label>
            <select
              id="status"
              class="form-control"
              name="status"
              [(ngModel)]="request.status"
              required>
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
            <button type="submit" class="btn btn-primary" [disabled]="productForm.invalid || loading">
              {{ loading ? 'Updating…' : 'Update Product' }}
            </button>
          </div>

        </form>
      </ng-container>

    </div>
  </div>
</div>
